# =============================================================================
# reference.conf — Full default configuration for java-tron
# =============================================================================
#
# This file defines the default value for every configuration parameter.
# It is packaged inside the jar and loaded automatically via Typesafe Config's
# standard mechanism: ConfigFactory.defaultReference().
#
# Loading priority (highest wins):
#   1. User's external config file (e.g. config.conf passed via -c flag)
#   2. This file (reference.conf, bundled in jar)
#
# When a user's config.conf omits a parameter, the value from this file is
# used as the fallback. This ensures the node always has a complete and valid
# configuration, even if the user only overrides a few parameters.
#
# Maintenance rules:
#   - Every parameter that the code reads must have an entry here
#   - Values must match the bean field initializers in the corresponding
#     XxxConfig.java classes (VmConfig, NodeConfig, CommitteeConfig, etc.)
#   - Keep the section order and key order identical to config.conf for
#     easy side-by-side comparison
#   - When adding a new parameter: add it here AND in the bean class
#
# Key naming rules (required for ConfigBeanFactory auto-binding):
#   - Use standard camelCase: maxConnections, syncFetchBatchNum, etc.
#
# =============================================================================

net {
  # type is deprecated and has no effect.
  # type = mainnet
}

storage {
  # Database engine: "LEVELDB" or "ROCKSDB" (ARM only supports ROCKSDB), case-insensitive
  db.engine = "LEVELDB"

  # Controls the database write strategy.
  # true  - Synchronous writes. Higher durability, lower performance.
  # false - Asynchronous writes. Higher performance, but recent writes may be
  #         lost if the machine crashes before data is flushed to disk.
  # Asynchronous writes can significantly improve FullNode block sync performance.
  db.sync = false

  db.directory = "database"

  # Whether to write transaction result in transactionRetStore
  transHistory.switch = "on"

  # Per-database LevelDB option overrides.Default: empty. All databases use global LevelDB settings.
  # These settings can be tuned to improve database performance during block synchronization.
  # Note:
  # - Increasing `maxOpenFiles` may significantly increase file descriptor usage.
  # - If "Too many open files" errors occur, check the system `ulimit` configuration.
  # - See TIP-343 for tuning recommendations:
  #   https://github.com/tronprotocol/tips/blob/master/tip-343.md
  # The following presets are provided as default. If block synchronization
  # performance is unsatisfactory, consider adjusting the settings accordingly.
  #
  # Global default settings:
  # default = {
  #   blockSize = 4096,           // 4 KB
  #   writeBufferSize = 16777216, // 16 MB
  #   cacheSize = 33554432,       // 32 MB
  #   maxOpenFiles = 100
  # }
  # Default for bulk-read databases: code, contract
  # defaultM = {
  #   blockSize = 4096,           // 4 KB
  #   writeBufferSize = 67108864, // 64 MB
  #   cacheSize = 33554432,       // 32 MB
  #   maxOpenFiles = 100          // recommend 500 for production
  # }
  # Default for frequently accessed databases: account, delegation, storage-row
  # defaultL = {
  #   blockSize = 4096,           // 4 KB
  #   writeBufferSize = 67108864, // 64 MB
  #   cacheSize = 33554432,       // 32 MB
  #   maxOpenFiles = 100          // recommend 1000 for production
  # }

  # Per-database storage configuration overrides. Otherwise databases use global defaults and store
  # data in "output-directory" or the directory specified by the "-d" / "--output-directory" option.
  # Attention: name is a required field that must be set!
  # The name and path properties take effect for both LevelDB and RocksDB storage engines,
  # while additional 4 properties (blockSize, writeBufferSize, cacheSize, maxOpenFiles)
  # only take effect when using LevelDB.
  # Example:
  # properties = [
  #   {
  #     name = "account",
  #     path = "storage_directory_test",
  #     blockSize = 4096,           // 4  KB =         4 * 1024 B
  #     writeBufferSize = 10485760, // 10 MB = 10 * 1024 * 1024 B
  #     cacheSize = 10485760,       // 10 MB = 10 * 1024 * 1024 B
  #     maxOpenFiles = 100
  #   },
  # ]
  properties = []

  needToUpdateAsset = true

  # RocksDB settings (only used when db.engine = "ROCKSDB")
  # Strongly recommend NOT modifying unless you know every item's meaning clearly.
  dbSettings = {
    levelNumber = 7
    compactThreads = 0          // 0 = auto: max(availableProcessors, 1)
    blocksize = 16              // n * KB
    maxBytesForLevelBase = 256  // n * MB
    maxBytesForLevelMultiplier = 10
    level0FileNumCompactionTrigger = 2
    targetFileSizeBase = 64     // n * MB
    targetFileSizeMultiplier = 1
    maxOpenFiles = 5000
  }

  balance.history.lookup = false

  # Checkpoint version for snapshot mechanism. Version 2 enables V2 snapshot.
  checkpoint.version = 1
  checkpoint.sync = true

  # Estimated number of block transactions (default 1000, min 100, max 10000).
  # Total cached transactions = 65536 * txCache.estimatedTransactions
  txCache.estimatedTransactions = 1000
  # If true, transaction cache initialization will be faster.
  txCache.initOptimization = false

  # Number of blocks flushed to db in each batch during node syncing.
  snapshot.maxFlushCount = 1

  # Data root setting, for check data, currently only reward-vi is used.
  # merkleRoot = {
  #   reward-vi = 9debcb9924055500aaae98cdee10501c5c39d4daa75800a996f4bdda73dbccd8 // main-net
  # }
}

node.discovery = {
  enable = false
  persist = false
  external.ip = ""
}

# Custom stop condition
# node.shutdown = {
#   BlockTime  = "54 59 08 * * ?"   # if block header time in persistent db matched
#   BlockHeight = 33350800           # if block header height in persistent db matched
#   BlockCount = 12                  # block sync count after node start
# }

node.backup {
  port = 10001             # UDP listen port; each member should have the same configuration
  priority = 0             # Node priority; each member should use a different priority
  keepAliveInterval = 3000 # Keep-alive interval (ms); each member should have the same configuration
  members = [
    # "ip",               # Peer IP list, better to add at most one IP; must not contain this node's own IP
  ]
}

# Algorithm for generating public key from private key. Do not modify to avoid forks.
crypto {
  engine = "eckey"
}

# Energy limit block number (config key has typo "enery" preserved for backward compatibility)
enery.limit.block.num = 4727890

node.metrics = {
  prometheus {
    enable = false
    port = 9527
  }
}

node {
  # Trust node for solidity node (example: "127.0.0.1:50051").
  trustNode = ""

  # Expose extension api to public or not
  walletExtensionApi = false

  listen.port = 18888
  fetchBlock.timeout = 500

  # Number of blocks to fetch in one batch during sync. Range: [100, 2000].
  syncFetchBatchNum = 2000
  # Max in-flight (requested but not yet processed) blocks during sync. Range: [50, 2000].
  maxPendingBlockSize = 500

  # Number of validate sign threads, default availableProcessors
  # Number of validate sign threads, 0 = auto (availableProcessors)
  validateSignThreadNum = 0

  maxConnections = 30
  minConnections = 8
  minActiveConnections = 3
  maxConnectionsWithSameIp = 2
  maxHttpConnectNumber = 50
  minParticipationRate = 0

  # WARNING: Some shielded transaction APIs require sending private keys as parameters.
  # Calling these APIs on untrusted or remote nodes may leak your private keys.
  # It is recommended to invoke them locally for development and testing.
  # To opt in, set: allowShieldedTransactionApi = true
  # Migration: the legacy key node.fullNodeAllowShieldedTransaction is still supported
  # but deprecated; please migrate to node.allowShieldedTransactionApi.
  # allowShieldedTransactionApi = false

  # Whether to print config log at startup
  openPrintLog = true

  # If true, SR packs transactions into a block in descending order of fee;
  # otherwise, packs by receive timestamp.
  openTransactionSort = false

  # Threshold for broadcast transactions received from each peer per second,
  # transactions exceeding this are discarded
  maxTps = 1000
  # Max block inv hashes accepted per peer per second. Minimum: 1.
  maxBlockInvPerSecond = 10

  isOpenFullTcpDisconnect = false
  inactiveThreshold = 600       // seconds
  maxFastForwardNum = 4

  # Legacy alias `maxActiveNodesWithSameIp` is still accepted from user config
  # (see NodeConfig alias-fallback) but is intentionally NOT defaulted here —
  # shipping it in reference.conf would always mask the modern `maxConnectionsWithSameIp`.
  metricsEnable = false

  p2p {
    version = 11111   # Mainnet:11111; Nile:201910292; Shasta:1
  }

  active = [
    # Active establish connection in any case
    # "ip:port",
    # "ip:port"
  ]

  passive = [
    # Passive accept connection in any case
    # "ip:port",
    # "ip:port"
  ]

  fastForward = [
    "100.27.171.62:18888",
    "15.188.6.125:18888"
  ]

  http {
    fullNodeEnable = true
    fullNodePort = 8090
    solidityEnable = true
    solidityPort = 8091
    PBFTEnable = true
    PBFTPort = 8092

    # Maximum HTTP request body size (default 4M). Setting to 0 rejects all non-empty request bodies.
    # Independent from rpc.maxMessageSize.
    maxMessageSize = 4194304
  }

  rpc {
    enable = true
    port = 50051
    solidityEnable = true
    solidityPort = 50061
    PBFTEnable = true
    PBFTPort = 50071

    # Number of gRPC threads, 0 = auto (availableProcessors / 2)
    thread = 0

    # Maximum concurrent calls per incoming connection
    # 0 means No limit on concurrent calls per connection
    maxConcurrentCallsPerConnection = 0

    # HTTP/2 flow control window (bytes), default 1MB
    flowControlWindow = 1048576

    # Connection idle timeout (ms). Connections idle longer than this are gracefully terminated. 0 = no limit
    maxConnectionIdleInMillis = 0

    # Connection max age (ms). 0 = no limit
    maxConnectionAgeInMillis = 0

    # Maximum gRPC message size in bytes (default 4194304, ~4MB).
    # Must be a non-negative integer. Setting to 0 rejects all non-empty messages.
    maxMessageSize = 4194304

    # Maximum header list size (bytes), default 8192
    maxHeaderListSize = 8192

    # RST_STREAM frames allowed per connection per period, 0 = no limit
    maxRstStream = 0

    # Seconds per period for gRPC RST_STREAM limit
    secondsPerWindow = 0

    # Minimum effective connections required to broadcast transactions
    minEffectiveConnection = 1

    # Reflection service switch for grpcurl tool
    reflectionService = false
    trxCacheEnable = false
  }

  # Number of solidity threads in FullNode.
  # Increase if solidity rpc/http interface timeouts occur.
  # Default: number of cpu cores.
  # Number of solidity threads, 0 = auto (availableProcessors)
  solidity.threads = 0

  # Maximum percentage of producing block interval (provides time for broadcast etc.)
  blockProducedTimeOut = 50

  # Maximum transactions from network layer per second
  netMaxTrxPerSecond = 700

  # Whether to enable node detection function
  nodeDetectEnable = false

  # Use IPv6 address for node discovery and TCP connection
  enableIpv6 = false

  # If node's highest block is below all peers, try to acquire new connection
  effectiveCheckEnable = false

  # Dynamic loading configuration function
  dynamicConfig = {
    enable = false
    checkInterval = 600
  }

  # Block solidification check
  unsolidifiedBlockCheck = false
  maxUnsolidifiedBlocks = 54
  blockCacheTimeout = 60

  # TCP and transaction limits
  maxTransactionPendingSize = 2000
  pendingTransactionTimeout = 60000
  # total cached trx across handler queues + pending + rePush
  maxTrxCacheSize = 50000

  # Consensus agreement
  agreeNodeCount = 0

  # Shielded transaction (ZK)
  zenTokenId = "000000"
  shieldedTransInPendingMaxCounts = 10

  # Contract proto validation thread pool (0 = auto: availableProcessors)
  validContractProto.threads = 0

  dns {
    # DNS URLs to discover peers, format: tree://{pubkey}@{domain}. Default: empty.
    treeUrls = [
      # "tree://AKMQMNAJJBL73LXWPXDI4I5ZWWIZ4AWO34DWQ636QOBBXNFXH3LQS@main.trondisco.net",
    ]

    # Enable or disable DNS publish. Default: false.
    publish = false
    # DNS domain to publish nodes, required if publish is true.
    dnsDomain = ""
    # DNS private key used to publish, required if publish is true, hex string of length 64.
    dnsPrivate = ""
    # Known DNS URLs to publish if publish is true, format: tree://{pubkey}@{domain}. Default: empty.
    knownUrls = []
    # Static nodes to publish on DNS, "ip:port".
    staticNodes = []
    # Merge several nodes into a leaf of tree, should be 1~5.
    maxMergeSize = 5
    # Only update DNS data when node change percent exceeds this threshold.
    changeThreshold = 0.1
    # DNS server to publish, required if publish is true. Supported values: "aws", "aliyun".
    serverType = ""
    # Access key ID of AWS or Aliyun API, required if publish is true.
    accessKeyId = ""
    # Access key secret of AWS or Aliyun API, required if publish is true.
    accessKeySecret = ""
    # Endpoint of Aliyun DNS server, required if serverType is "aliyun".
    aliyunDnsEndpoint = ""
    # Region of AWS API (e.g. "us-east-1"), required if serverType is "aws".
    awsRegion = ""
    # Host zone ID of AWS domain, required if serverType is "aws".
    awsHostZoneId = ""
  }

  # Open history query APIs on lite FullNode (may return null for some queries)
  openHistoryQueryWhenLiteFN = false

  # Deprecated: these fields were used by the old connection-factor algorithm.
  # They are still accepted from user config for backward compatibility but have no effect.
  activeConnectFactor = 0.1
  connectFactor = 0.6

  jsonrpc {
    # Note: Before release_4.8.1, if you turn on jsonrpc and run it for a while and then turn it off,
    # you will not be able to get the data from eth_getLogs for that period of time. Default: false
    httpFullNodeEnable = false
    httpFullNodePort = 8545
    httpSolidityEnable = false
    httpSolidityPort = 8555
    httpPBFTEnable = false
    httpPBFTPort = 8565

    # The maximum blocks range to retrieve logs for eth_getLogs, default: 5000, <=0 means no limit
    maxBlockRange = 5000
    # Allowed max address count in filter request, default: 1000, <=0 means no limit
    maxAddressSize = 1000
    # The maximum number of allowed topics within a topic criteria, default: 1000, <=0 means no limit
    maxSubTopics = 1000
    # Allowed maximum number for blockFilter, default: 50000, <=0 means no limit
    maxBlockFilterNum = 50000
    # Allowed batch size, default: 100, <=0 means no limit
    maxBatchSize = 100
    # Allowed max response byte size, default: 26214400 (25 MB), <=0 means no limit
    maxResponseSize = 26214400
    # Allowed maximum number for newFilter, <=0 means no limit
    maxLogFilterNum = 20000
    # Maximum JSON-RPC request body size in bytes (default 4194304, ~4MB). Independent from rpc.maxMessageSize.
    maxMessageSize = 4194304
  }

  # Disabled API list (works for http, rpc and pbft, not jsonrpc). Case insensitive.
  disabledApi = [
    # "getaccount",
    # "getnowblock2"
  ]
}

## Rate limiter config
rate.limiter = {
  # Each HTTP servlet and gRPC method can have its own rate-limit strategy.
  # Three blocking strategies are available:
  #   GlobalPreemptibleAdapter – limits maximum concurrent requests globally.
  #                              paramString = "permit=N" (N = max concurrent calls)
  #   QpsRateLimiterAdapter    – limits average QPS across all callers.
  #                              paramString = "qps=N" (N may be a decimal)
  #   IPQPSRateLimiterAdapter  – limits average QPS per source IP.
  #                              paramString = "qps=N" (N may be a decimal)
  # If no strategy is configured for an endpoint, QpsRateLimiterAdapter with
  # qps=1000 is applied automatically.

  # Per-servlet HTTP rate limits. component is the servlet class simple name.
  http = [
    # {
    #   component = "GetNowBlockServlet",
    #   strategy = "GlobalPreemptibleAdapter",
    #   paramString = "permit=1"
    # },
    # {
    #   component = "GetAccountServlet",
    #   strategy = "IPQPSRateLimiterAdapter",
    #   paramString = "qps=1"
    # },
    # {
    #   component = "ListWitnessesServlet",
    #   strategy = "QpsRateLimiterAdapter",
    #   paramString = "qps=1"
    # }
  ]

  # Per-method gRPC rate limits. component is "package.ServiceName/MethodName".
  rpc = [
    # {
    #   component = "protocol.Wallet/GetBlockByLatestNum2",
    #   strategy = "GlobalPreemptibleAdapter",
    #   paramString = "permit=1"
    # },
    # {
    #   component = "protocol.Wallet/GetAccount",
    #   strategy = "IPQPSRateLimiterAdapter",
    #   paramString = "qps=1"
    # },
    # {
    #   component = "protocol.Wallet/ListWitnesses",
    #   strategy = "QpsRateLimiterAdapter",
    #   paramString = "qps=1"
    # }
  ]

  p2p = {
    # QPS ceiling for individual P2P message types received from peers.
    # Values are doubles; fractional QPS is allowed (e.g. 0.5 = one per 2 s).
    syncBlockChain = 3.0  # SyncBlockChain handshake messages
    fetchInvData = 3.0    # FetchInvData (block/tx fetch) messages
    disconnect = 1.0      # Disconnect messages
  }

  # Node-wide QPS ceiling across all HTTP + gRPC requests combined.
  global.qps = 50000
  # Per-source-IP QPS ceiling across all HTTP + gRPC requests from that IP.
  global.ip.qps = 10000
  # Default per-endpoint QPS limit applied to any endpoint with no explicit strategy.
  global.api.qps = 1000
  # true = reject over-limit requests immediately; false = queue and block the caller.
  apiNonBlocking = false
}

